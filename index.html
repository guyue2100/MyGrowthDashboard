    <link rel="manifest" href="/manifest.json" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Baby Growth Dashboard",
      "url": "https://www.babygrow.online/",
      "description": "A comprehensive tool for tracking child growth using WHO standards and predicting adult height using AI.",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "All",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "Baby Growth Dashboard"
      }
    }
    </script>

    <!-- FAQ Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How accurate is the AI height predictor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our predictor uses the FPH (Final Parental Height) algorithm combined with current growth percentile data. While genetics account for 70% of height, environmental factors like nutrition and sleep play a significant role."
          }
        },
        {
          "@type": "Question",
          "name": "What are WHO child growth standards?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The WHO Child Growth Standards describe the growth of children living in environments that support healthy growth. They are used worldwide to monitor child development."
          }
        },
        {
          "@type": "Question",
          "name": "When should I be concerned about my baby's growth curve?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Consult a pediatrician if the growth curve crosses two or more major percentile lines, or if growth consistently stays below the 3rd or above the 97th percentile."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
